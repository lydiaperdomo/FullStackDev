<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Simple Form</title>
        <script src="shadow.js"></script>
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: beige;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f6f3f3;
        }

        #shadowBox {
            position: fixed;
            top: 0%;
            left: 0%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            background-color: rgb(0, 0, 0, 0.5);
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 1000;
        }





    </style>
    <body>





<button id="openBox">Open Box</button>
<div id="overlay">  </div>

<div id ="shadowBox">
    <span id="closeBox">close</span>
    <h2>Shadow Box Title</h2>
    <p>This is the content of the shadow box. You can put any information you want here. 
        It will appear on top of the overlay when you click the "Open Box" button.</p>
</div>













<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        </body>
        </html>
