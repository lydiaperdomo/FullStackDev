<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Password Generator</title>
        <link rel="stylesheet" href="passgen.css">
    </head>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: beige;
        }

        #password {
            font-size: 24px;
            margin: 20px 0;
            word-wrap: break-word;
        }

        #generate-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f6f3f3;
        }

        #copy-btn {
            background-color: #f6f3f3;
        }

        .container {
            display: inline-block;
            text-align: center;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f3f3ed;
        }


    </style>
    <body>

<h1> Password Generator</h1>

<div class="container">
<h3 id="passwordDisplay">Generated Password Will Appear Here</h3>

<button id="generate-btn">Generate Password</button>
<p>

<div>
<input type="checkbox" id="include-numbers" checked>
<label for="include-numbers">Include Numbers</label><br>    
<input type="checkbox" id="include-symbols" checked>
<label for="include-symbols">Include Symbols</label><br>
</div>



<p>

<button id="copy-btn">Copy to Clipboard</button>
</div>
            <script src="passgen.js"></script>
    </body>
</html>
